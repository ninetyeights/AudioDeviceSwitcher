name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore
        run: dotnet restore CKit/CKit.csproj

      - name: Publish (Release, win-x64, self-contained, single-file)
        run: >-
          dotnet publish CKit/CKit.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Derive version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''
          "version=$ver" >> $env:GITHUB_OUTPUT
          "installer=dist/AudioDeviceSwitcher-Setup-$ver.exe" >> $env:GITHUB_OUTPUT

      - name: Build installer
        run: iscc /DAppVersion=${{ steps.ver.outputs.version }} installer\AudioDeviceSwitcher.iss
        shell: cmd

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ steps.ver.outputs.installer }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ${{ steps.ver.outputs.installer }}
